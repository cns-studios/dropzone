services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dropzone_user
      POSTGRES_PASSWORD: dropzone_password
      POSTGRES_DB: dropzone_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://dropzone_user:dropzone_password@db:5432/dropzone_db?sslmode=disable
      - UPLOAD_DIR=/app/uploads
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data: