name: Promote Nightly Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.2.3)"
        required: true
      source_tag:
        description: "Prerelease tag to promote"
        required: false
        default: "nightly"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Version '$VERSION' is invalid. Expected format like 1.2.3"
            exit 1
          fi

      - name: Download prerelease assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "$SOURCE_TAG" --dir artifacts

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
        run: |
          set -euo pipefail

          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release tag '$TAG' already exists"
            exit 1
          fi

          TARGET_SHA="$(gh release view "$SOURCE_TAG" --json targetCommitish -q '.targetCommitish')"

          mapfile -t files < <(find artifacts -type f)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No assets found in prerelease '$SOURCE_TAG'"
            exit 1
          fi

          gh release create "$TAG" "${files[@]}" \
            --title "$TAG" \
            --target "$TARGET_SHA" \
            --notes "Promoted from prerelease tag '$SOURCE_TAG'."