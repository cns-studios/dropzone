name: Nightly Build

on:
  push:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri (NSIS .exe)
        working-directory: desktop
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            jq \
            ruby \
            ruby-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri (deb and rpm)
        working-directory: desktop
        run: npm run tauri build -- --bundles deb,rpm

      - name: Install fpm
        run: sudo gem install --no-document fpm

      - name: Build pacman package
        run: |
          set -euo pipefail
          APP_VERSION="$(jq -r '.version' desktop/src-tauri/tauri.conf.json)"
          mkdir -p desktop/src-tauri/target/release/bundle/pacman

          fpm \
            -s dir \
            -t pacman \
            -n dropzone \
            -v "${APP_VERSION}" \
            --iteration 1 \
            --architecture x86_64 \
            --description "Dropzone desktop app" \
            -p "desktop/src-tauri/target/release/bundle/pacman/dropzone-${APP_VERSION}-1-x86_64.pkg.tar.zst" \
            desktop/src-tauri/target/release/desktop=/usr/bin/dropzone

          cp \
            "desktop/src-tauri/target/release/bundle/pacman/dropzone-${APP_VERSION}-1-x86_64.pkg.tar.zst" \
            "desktop/src-tauri/target/release/bundle/pacman/dropzone-${APP_VERSION}.pacman"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/pacman/*.pkg.tar.zst
            desktop/src-tauri/target/release/bundle/pacman/*.pacman
          if-no-files-found: error

  publish-nightly:
    name: Publish nightly prerelease
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view nightly >/dev/null 2>&1; then
            gh release delete nightly --cleanup-tag --yes
          fi

          mapfile -t files < <(find artifacts -type f)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No artifacts found to publish"
            exit 1
          fi

          gh release create nightly "${files[@]}" \
            --title "Nightly Build" \
            --notes "Automated nightly build from ${GITHUB_SHA} on $(date -u +'%Y-%m-%d %H:%M UTC')." \
            --prerelease