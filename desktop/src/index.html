<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Dropzone</title>
</head>
<body>
    <div id="app" class="container">
            <div id="onboarding" class="screen">
            <h1>Welcome to Dropzone</h1>
            <p>Enter your credentials to start syncing.</p>
            <input type="text" id="api-key" placeholder="API Key (UUID)" />
            <input type="text" id="server-url" placeholder="Server URL (http://ip:8080)" />
            <button id="btn-save">Start Dropzone</button>
            <p class="hint">Hotkey: <strong>Ctrl + Shift + D</strong></p>
        </div>

        <div id="main-drop" class="screen hidden">
            <div id="top-bar">
                <span id="owner-label"></span>
                <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
            </div>

            <div id="drop-area">
                <div class="icon">📥</div>
                <h2>Drop Files Here</h2>
                <p id="status-text">Ready to sync</p>
            </div>

            <div id="recent-files">
                <p class="section-label">Recent</p>
                <div id="file-list"></div>
            </div>
        </div>

        <div id="settings" class="screen hidden">
            <div id="top-bar">
                <span class="section-label">Settings</span>
                <button id="btn-back" class="icon-btn">✕</button>
            </div>
            <div class="settings-body">
                <div class="setting-row"><span class="s-label">Name</span><span id="s-owner" class="s-val"></span></div>
                <div class="setting-row"><span class="s-label">API Key</span><span id="s-key" class="s-val mono"></span></div>
                <div class="setting-row"><span class="s-label">Server</span><span id="s-url" class="s-val mono"></span></div>
                <div id="qr-container">
                    <p>Scan to pair Android</p>
                    <div id="qrcode"></div>
                </div>
                <button id="btn-reset" class="danger">Reset Settings</button>
            </div>
        </div>
      </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
